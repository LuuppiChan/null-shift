default_collapse_state = false
end_space = true
end_space_height = 200
tooltip_len = 500
auto_send_voice = true
send_pdf_bin = false
core_history = "/home/luuppi/.null-shift/brain/history.json"

[voice.whisper]
model_path = "/home/luuppi/Documents/coding/projects/null_shift/models/whisper/en/ggml-large-v3-turbo-q5_0.bin"
threads = 12

[voice]

context_injection = "User is talking to you via voice. Expect transcription errors. Correct them automatically or ask for clarification if needed."

pause_threshold = 1.2
phrase_time_limit = 60.0
non_speaking_duration = 1.2

tts_vad_sensitivity = 5.5
tts_vad_consecutive_chunks = 4

wake_word = ["orion", "computer", "tietokone"]

ignore_fuzz_ratio = 95
ignore_list = [
  "[blank_audio]",
  "[sound]",
  "[clears throat]",
  "[audio out]",
  "[bang]",

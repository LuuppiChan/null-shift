[voice.replace_filter]
'(?:Ryan|Oran|Aran|Brian)' = 'Orion'

[speak]
backend = "piper"
always = false
with_stt = true
stop_on_voice = true
audio_feedback = false
context_injection = """Your response is streamed to a text-to-speech model. Output short and conversational answers.
Code blocks and LaTex blocks are filtered out of the spoken answer. Other markdown features are forbidden."""

# applied to a sentence.
# Supports regex
[speak.replace_filter]
asmr = 'A S M R'

# Matches either *text* or **text** or _text_ or __text__, ensuring both sides match exactly
'(\*{1,2}|\_{1,2})(.*?)\1' = '\2'

'(?:\#)' = ''

[speak.piper]
model = "/home/luuppi/Documents/coding/projects/null_shift/models/piper/en_GB-alan-low.onnx"
config = "/home/luuppi/Documents/coding/projects/null_shift/models/piper/en_GB-alan-low.onnx.json"
cuda = false
pool_size = 4

  "[music]",
  "[ silence ]",
  "[inaudible]",
  "[laughter]",
  "[sigh]",
  "[gasp]",
  "[coughing]",
  "[muted]",
  "[beep] [beep] [beep]",
  "[beep] [beep]",
  "[beep]",
  "[beeping]",
  "[giggle]",
  "[no audio]",
  "[grunts]",
  "[camera shutter clicks]",
  "[snap]",
  "[snorts]",
  "[fart]",
  "[click]",
  "[blow]",
  "[cough]",
  "thanks.",
  "okay.",
  "welcome.",
  "thank you.",
  "mm-mm.",
  "bye.",
  "hmm.",
  "Uh-uh.",
  "you",
  "thank you. thank you.",

# Cognition Node — Example Configuration
#
# Any key absent from this file falls back to the default defined in
# cognition/config.py. Only override what you actually need.

[llm]
# "openai" | "vertexai"
provider = "vertexai"
model = "google/gemini-2.5-flash"
api_key = "foo"
base_url = "http://localhost:4000/v1"
temperature = 0.7
max_history = 20
max_iterations = 100

# VertexAI only (ignored when provider = "openai")
vertex_project = "thinking-prism-488306-a9"
vertex_location = "global"

[zmq]
input_bind = "tcp://*:5555"
output_bind = "tcp://*:5556"

[paths]
personality = "cognition/personality.md"
memory = "cognition/memory/memory.md"
expiring_notes = "cognition/memory/expiring_notes.json"
history = "cognition/memory/history.json"
tools = "cognition/tools"
context_plugins = "cognition/context_plugins"
prompts = "cognition/prompts"

[behaviour]
log_level = "INFO"
